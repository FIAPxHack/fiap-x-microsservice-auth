spring:
  main:
    lazy-initialization: true
    banner-mode: off
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
  datasource:
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      idle-timeout: ${DB_IDLE_TIMEOUT:10000}
      max-lifetime: ${DB_MAX_LIFETIME:30000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:5000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:WARN}
    br.com.fiapx: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
    org.hibernate.SQL: OFF
