server:
  port: 0

spring:
  application:
    name: fiap-x-microservice-auth-bdd

  datasource:
    url: placeholder-will-be-overridden-by-dynamic-properties
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  main:
    allow-bean-definition-overriding: true

# JWT Configuration
jwt:
  secret: test-secret-key-for-bdd-tests-minimum-32-characters-long
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: fiap-x-auth-service-test

# User Service Configuration (will be mocked)
user-service:
  base-url: http://localhost:9999
  timeout: 5000

# Logging
logging:
  level:
    root: INFO
    br.com.fiapx: DEBUG
